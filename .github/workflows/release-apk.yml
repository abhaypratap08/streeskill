name: Release Android APK

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to attach the APK to
        required: true

permissions:
  contents: write

jobs:
  build-and-upload-apk:
    name: Build and upload APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: StreeSkill

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: StreeSkill/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build APK with EAS
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: npm run build:production-apk:release > eas-build.json

      - name: Read EAS artifact URL
        id: eas
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const output = JSON.parse(fs.readFileSync('eas-build.json', 'utf8'));
          const build = Array.isArray(output) ? output[0] : output;
          const artifactUrl =
            build?.artifacts?.buildUrl ||
            build?.artifacts?.applicationArchiveUrl ||
            build?.artifactUrl;

          if (!artifactUrl) {
            console.error('Could not find an APK artifact URL in EAS output:');
            console.error(JSON.stringify(output, null, 2));
            process.exit(1);
          }

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `artifact_url=${artifactUrl}\n`);
          NODE

      - name: Download APK
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
          ARTIFACT_URL: ${{ steps.eas.outputs.artifact_url }}
        run: |
          APK_NAME="StreeSkill-${RELEASE_TAG}.apk"
          APK_NAME="${APK_NAME//\//-}"
          curl --fail --location "$ARTIFACT_URL" --output "$APK_NAME"
          echo "APK_NAME=$APK_NAME" >> "$GITHUB_ENV"

      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 ||
            gh release create "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --title "$RELEASE_TAG" --notes "Android APK release."

      - name: Upload APK to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: gh release upload "$RELEASE_TAG" "$APK_NAME" --repo "$GITHUB_REPOSITORY" --clobber
